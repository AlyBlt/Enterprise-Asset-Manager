name: CI/CD - Asset Manager

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # Local runner veya containerda kullanưlacak environment
      APP_PORT: ${{ secrets.APP_PORT }}
      STUDENT_NAME: ${{ secrets.STUDENT_NAME }}
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${{ secrets.Jwt__Key }}
      Jwt__Issuer: ${{ secrets.Jwt__Issuer }}
      Jwt__Audience: ${{ secrets.Jwt__Audience }}
      Jwt__DurationInMinutes: ${{ secrets.Jwt__DurationInMinutes }}
      MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
      ConnectionStrings__DefaultConnection: ${{ secrets.ConnectionStrings__DefaultConnection }}

    steps:
      # 1.Repo’yu checkout et
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. NET SDK Kur
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      # 3. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore AssetManager.slnx

      # 4. Build solution
      - name: Build solution
        run: dotnet build AssetManager.slnx --configuration Release --no-restore

      # 5. Run tests
      - name: Run All Tests
        run: dotnet test AssetManager.slnx --no-build --verbosity normal

      # 6. Package Docker images
      - name: Build Docker images
        run: docker compose -f compose.yml build --pull

      # 7. Deploy to remote server via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # Hedef klasöre git
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}

            # Kodu güncelle
            git pull origin main

            # Docker Compose ile ayađa kaldưr
            docker compose -f compose.yml pull
            docker compose -f compose.yml up -d --remove-orphans

            # Migration i₫lemi (CI/CD sưrasưnda db migration)
            docker exec -i assetmanager-api dotnet ef database update \
              --startup-project /app/src/AssetManager.API \
              --project /app/src/AssetManager.Infrastructure