server {
    listen 80;

    # API Yönlendirmesi
    location /api/ {
        proxy_pass http://api:8080; # Sondaki /api/ kýsmýný kaldýrdýk, Nginx otomatik iletir
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health Check (Ödevin istediđi endpoint)
    location /health {
        proxy_pass http://api:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Web MVC
    location / {
        proxy_pass http://web:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host:11111;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}